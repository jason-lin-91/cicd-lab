name: CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # 修正為正確的參數名稱
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    # 1. TypeScript typecheck (20%)
    - name: TypeScript typecheck
      run: npx tsc --noEmit

    # 2. Prettier check (20%)
    - name: Prettier check
      run: npx prettier --check .

    # 3. Test & 顯示於結果頁面 (40% - 包含測試與顯示結果)
    # 這裡直接執行 jest，畫面的 Log 就會是完美的測試結果報告
    - name: Run Tests
      run: npm run test -- --watchAll=false